<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0c0b09">
  <meta name="description" content="Tap kanji on a 5×5 grid to identify Japanese words.">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Kandy">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Noto+Serif+JP:wght@400;700&display=swap" rel="stylesheet">
  <title>Kandy · 漢字</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #0c0b09;
      --surface:      #161412;
      --surface-2:    #1e1c19;
      --surface-3:    #252320;
      --border:       rgba(255,255,255,0.07);
      --border-mid:   rgba(255,255,255,0.11);
      --text:         #f0ebe4;
      --text-muted:   #6b6560;
      --text-dim:     #3a3833;

      --accent:       #6b9fff;
      --accent-glow:  rgba(107, 159, 255, 0.18);
      --accent-ring:  rgba(107, 159, 255, 0.5);

      --correct:      #5cc97a;
      --correct-glow: rgba(92, 201, 122, 0.15);
      --wrong:        #f06060;
      --wrong-glow:   rgba(240, 96, 96, 0.15);
      --orange:       #f09a3e;

      --font-jp:  'Noto Serif JP', 'Hiragino Mincho ProN', 'Yu Mincho', serif;
      --font-ui:  'Inter', -apple-system, sans-serif;
      --font-grid:'Hiragino Sans', 'Meiryo', 'Noto Sans JP', sans-serif;

      --ease-out: cubic-bezier(0.22, 1, 0.36, 1);
      --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    /* ── Keyframes ─────────────────────────────── */
    @keyframes fadeIn      { from { opacity:0 } to { opacity:1 } }
    @keyframes fadeInUp    { from { opacity:0; transform:translateY(10px) } to { opacity:1; transform:translateY(0) } }
    @keyframes scaleIn     { from { opacity:0; transform:scale(0.92) } to { opacity:1; transform:scale(1) } }
    @keyframes sheetUp     { from { transform:translateY(72px); opacity:0 } to { transform:translateY(0); opacity:1 } }
    @keyframes stripSlide  { from { opacity:0; transform:translateY(-8px) } to { opacity:1; transform:translateY(0) } }
    @keyframes wordIn      { from { opacity:0; transform:translateY(5px) } to { opacity:1; transform:translateY(0) } }
    @keyframes iconPop     { 0%{transform:scale(0.4);opacity:0} 60%{transform:scale(1.18);opacity:1} 100%{transform:scale(1)} }
    @keyframes cellPop     { 0%{transform:scale(1)} 35%{transform:scale(0.86)} 75%{transform:scale(1.08)} 100%{transform:scale(1)} }
    @keyframes glowPulse   { 0%,100%{box-shadow: 0 0 0 0 var(--accent-glow), inset 0 0 0 1px var(--border)} 50%{box-shadow: 0 0 18px 4px var(--accent-glow), inset 0 0 0 1px rgba(107,159,255,0.2)} }

    /* ── Base ──────────────────────────────────── */
    body {
      font-family: var(--font-grid);
      background: var(--bg);
      color: var(--text);
      /* Fixed-height shell: header + grid + word section together fill
         the viewport, and the word list scrolls internally if its
         content overflows the available space. */
      height: 100dvh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 14px 14px;
      user-select: none;
      -webkit-user-select: none;
    }

    /* ── Header ────────────────────────────────── */
    #app-header {
      width: 100%;
      max-width: 500px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 2px 14px;
    }

    .header-wordmark {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .header-kanji {
      font-family: var(--font-jp);
      font-size: 20px;
      color: var(--text);
      letter-spacing: 2px;
      opacity: 0.9;
    }

    .header-divider {
      width: 1px;
      height: 14px;
      background: var(--border-mid);
    }

    .header-latin {
      font-family: var(--font-ui);
      font-size: 12px;
      font-weight: 500;
      color: var(--text-muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .header-extra {
      font-family: var(--font-ui);
      font-size: 12px;
      color: var(--text-muted);
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 5px 13px;
      letter-spacing: 0.01em;
    }

    .header-extra span {
      font-weight: 600;
      color: var(--text);
    }

    /* ── App ───────────────────────────────────── */
    #app {
      width: 100%;
      max-width: 500px;
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    /* ── Grid ──────────────────────────────────── */
    #grid-container {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 6px;
    }

    .kanji-cell {
      aspect-ratio: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(24px, 9vw, 48px);
      font-family: var(--font-grid);
      background: var(--surface);
      border-radius: 12px;
      cursor: pointer;
      touch-action: none;
      box-shadow: inset 0 0 0 1px var(--border), 0 2px 8px rgba(0,0,0,0.4);
      color: var(--text);
      transition: background 0.15s, box-shadow 0.15s, transform 0.12s var(--ease-out), color 0.15s;
      will-change: transform;
    }

    .kanji-cell.animating-in {
      animation: fadeInUp 0.32s var(--ease-out) both;
    }

    /* Single-kanji word is present on grid */
    .kanji-cell.word-present {
      background: #2e2b27;
      box-shadow: inset 0 0 0 1px rgba(107,159,255,0.2), 0 0 12px 0 var(--accent-glow), 0 2px 8px rgba(0,0,0,0.4);
      color: var(--accent);
      animation: glowPulse 3s ease-in-out infinite;
    }

    .kanji-cell.selected {
      background: var(--surface-3);
      box-shadow: inset 0 0 0 1px var(--accent-ring), 0 0 20px 2px var(--accent-glow), 0 2px 8px rgba(0,0,0,0.4);
      color: var(--accent);
      transform: scale(1.06);
    }

    .kanji-cell.tapped {
      animation: cellPop 0.26s var(--ease-out) both;
    }

    /* ── Selection strip ───────────────────────── */
    #selection-strip {
      display: none;
      align-items: center;
      gap: 10px;
      background: var(--surface-2);
      border-radius: 14px;
      padding: 11px 14px;
      box-shadow: inset 0 0 0 1px var(--border-mid), 0 4px 16px rgba(0,0,0,0.4);
    }

    #selection-strip.visible {
      display: flex;
      animation: stripSlide 0.22s var(--ease-out) both;
    }

    .strip-label {
      font-family: var(--font-ui);
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
      white-space: nowrap;
    }

    #selected-display {
      font-size: 22px;
      flex: 1;
      letter-spacing: 5px;
      color: var(--text);
    }

    .strip-btn {
      border: none;
      border-radius: 9px;
      padding: 7px 14px;
      font-family: var(--font-ui);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
    }
    .strip-btn:active { transform: scale(0.94); }

    #btn-confirm {
      background: var(--accent);
      color: #000;
    }
    #btn-cancel {
      background: var(--surface-3);
      color: var(--text-muted);
    }

    /* ── Word section ──────────────────────────── */
    #word-section {
      background: var(--surface);
      border-radius: 16px;
      box-shadow: inset 0 0 0 1px var(--border), 0 4px 16px rgba(0,0,0,0.3);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      flex: 1;
      min-height: 0;
    }

    .section-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 11px 14px;
      border-bottom: 1px solid var(--border);
    }

    .section-label {
      font-family: var(--font-ui);
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    #btn-reveal {
      background: none;
      border: 1px solid var(--border-mid);
      border-radius: 20px;
      padding: 4px 12px;
      font-family: var(--font-ui);
      font-size: 11px;
      font-weight: 500;
      color: var(--text-muted);
      cursor: pointer;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
    }
    #btn-reveal:hover {
      background: var(--surface-2);
      color: var(--text);
      border-color: rgba(255,255,255,0.18);
    }

    /* ── Word list ─────────────────────────────── */
    #word-list {
      display: grid;
      grid-template-columns: 1fr 1fr;
      padding: 6px 6px 6px 25px;
      gap: 2px;
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      /* Smooth iOS-style momentum scrolling. */
      -webkit-overflow-scrolling: touch;
    }

    .word-item {
      display: flex;
      align-items: center;
      gap: 8px;
      border-radius: 8px;
      padding: 7px 9px;
      font-family: var(--font-ui);
      font-size: 13px;
      color: var(--text-dim);
      background: transparent;
      transition: background 0.15s, color 0.15s, transform 0.1s;
      cursor: default;
    }

    .word-item::before {
      content: '';
      width: 5px;
      height: 5px;
      border-radius: 50%;
      flex-shrink: 0;
      background: var(--text-dim);
      transition: background 0.2s, transform 0.2s, box-shadow 0.2s;
    }

    .word-item.animating-in {
      animation: wordIn 0.22s var(--ease-out) both;
    }

    .word-item.just-revealed {
      animation: revealFlash 1.2s var(--ease-out);
    }
    @keyframes revealFlash {
      0%   { background: var(--accent-glow); }
      100% { background: transparent; }
    }

    .word-item.pending {
      cursor: pointer;
      color: #5a5650;
    }
    .word-item.pending::before { background: #353330; }

    .word-item.pending.formable {
      color: var(--text);
      font-weight: 500;
    }
    .word-item.pending.formable .word-text {
      text-decoration: underline;
      text-decoration-thickness: 1.5px;
      text-underline-offset: 3px;
    }
    .word-item.pending.formable::before {
      background: var(--accent);
      box-shadow: 0 0 6px 1px var(--accent-glow);
      transform: scale(1.3);
    }

    .word-item.pending.mastery-red  { color: var(--wrong); }
    .word-item.pending.mastery-red::before  { background: var(--wrong); box-shadow: 0 0 5px var(--wrong-glow); }

    .word-item.pending.mastery-orange { color: var(--orange); }
    .word-item.pending.mastery-orange::before { background: var(--orange); }

    .word-item.pending:hover {
      background: var(--surface-2);
      color: var(--text);
    }
    .word-item.pending:hover::before { background: var(--accent); }
    .word-item.pending:active { transform: scale(0.96); }

    .word-item.cleared {
      color: #2a2926;
    }
    .word-item.cleared::before { background: #232220; }
    .word-item.cleared .word-text { text-decoration: line-through; text-decoration-color: #333; }

    .word-text {
      transition: filter 0.3s ease;
      /* Allow wrapping so the right column has room when the left
         column is pushed away from the card border. */
      overflow-wrap: anywhere;
    }
    .word-item.hidden .word-text {
      filter: blur(4px);
      user-select: none;
      -webkit-user-select: none;
    }

    /* ── Toast ─────────────────────────────────── */
    #toast {
      position: fixed;
      bottom: 36px;
      left: 50%;
      transform: translateX(-50%) translateY(10px);
      background: rgba(30, 28, 25, 0.94);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--border-mid);
      color: var(--text);
      padding: 9px 20px;
      border-radius: 24px;
      font-family: var(--font-ui);
      font-size: 13px;
      font-weight: 500;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.18s ease, transform 0.18s var(--ease-out);
      white-space: nowrap;
      z-index: 500;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ── Modal (bottom sheet) ──────────────────── */
    #modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.72);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      z-index: 100;
      align-items: flex-end;
      justify-content: center;
    }
    #modal-overlay.visible {
      display: flex;
      animation: fadeIn 0.2s ease both;
    }

    #modal-box {
      background: var(--surface);
      border-radius: 24px 24px 0 0;
      padding: 10px 22px 44px;
      width: 100%;
      max-width: 500px;
      box-shadow: 0 -1px 0 var(--border-mid), 0 -20px 60px rgba(0,0,0,0.6);
      animation: sheetUp 0.32s var(--ease-out) both;
    }

    .modal-handle {
      width: 32px;
      height: 3px;
      background: var(--surface-3);
      border-radius: 2px;
      margin: 0 auto 18px;
    }

    #modal-word {
      text-align: center;
      font-family: var(--font-jp);
      font-size: 60px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 22px;
      letter-spacing: 6px;
      line-height: 1;
    }

    #kana-tiles {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      justify-content: center;
      margin-bottom: 14px;
    }

    .kana-tile {
      background: var(--surface-2);
      border: 1px solid var(--border-mid);
      border-radius: 10px;
      padding: 10px 14px;
      font-family: var(--font-grid);
      font-size: 20px;
      color: var(--text);
      cursor: pointer;
      min-width: 44px;
      text-align: center;
      transition: background 0.12s, opacity 0.15s, transform 0.12s var(--ease-out), box-shadow 0.12s;
    }
    .kana-tile:hover:not(.used) {
      background: var(--surface-3);
      box-shadow: 0 0 10px var(--accent-glow);
      border-color: rgba(107,159,255,0.3);
    }
    .kana-tile.tapped { animation: cellPop 0.22s var(--ease-out) both; }
    .kana-tile.used   { opacity: 0.2; pointer-events: none; }

    #kana-answer {
      display: flex;
      align-items: center;
      gap: 10px;
      min-height: 54px;
      background: var(--surface-2);
      border: 1px solid var(--border-mid);
      border-radius: 12px;
      padding: 10px 14px;
    }

    #kana-answer-text {
      flex: 1;
      font-family: var(--font-grid);
      font-size: 26px;
      letter-spacing: 3px;
      color: var(--text);
      min-height: 32px;
    }

    #btn-backspace {
      background: none;
      border: none;
      font-size: 20px;
      cursor: pointer;
      color: var(--text-muted);
      padding: 4px 8px;
      line-height: 1;
      transition: color 0.1s, transform 0.1s;
    }
    #btn-backspace:hover  { color: var(--text); }
    #btn-backspace:active { transform: scale(0.85); }

    #btn-modal-reveal {
      display: block;
      margin: 14px auto 0;
      background: none;
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 8px 22px;
      font-family: var(--font-ui);
      font-size: 12px;
      font-weight: 500;
      color: var(--text-muted);
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    #btn-modal-reveal:hover { background: var(--surface-2); color: var(--text); }

    /* ── Feedback overlay ──────────────────────── */
    #feedback-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 200;
      align-items: center;
      justify-content: center;
      padding: 24px;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }
    #feedback-overlay.visible { display: flex; animation: fadeIn 0.18s ease both; }
    #feedback-overlay.correct { background: rgba(10, 20, 12, 0.88); }
    #feedback-overlay.wrong   { background: rgba(20, 8, 8, 0.92); }

    #feedback-box {
      background: var(--surface);
      border-radius: 22px;
      padding: 40px 28px 36px;
      width: 100%;
      max-width: 340px;
      text-align: center;
      box-shadow: inset 0 0 0 1px var(--border-mid), 0 24px 60px rgba(0,0,0,0.7);
      animation: scaleIn 0.24s var(--ease-out) both;
    }

    #feedback-icon {
      font-size: 36px;
      margin-bottom: 14px;
      min-height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #feedback-overlay.correct #feedback-icon { color: var(--correct); }
    #feedback-overlay.wrong   #feedback-icon { color: var(--wrong); }
    #feedback-icon.animating  { animation: iconPop 0.28s var(--ease-out) both; }

    #feedback-word {
      font-family: var(--font-jp);
      font-size: 46px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 10px;
      line-height: 1;
      letter-spacing: 4px;
    }

    #feedback-reading {
      font-family: var(--font-grid);
      font-size: 24px;
      font-weight: 400;
      margin-bottom: 6px;
    }
    #feedback-overlay.correct #feedback-reading { color: var(--correct); }
    #feedback-overlay.wrong   #feedback-reading { color: var(--wrong); }

    #feedback-meaning {
      font-family: var(--font-ui);
      font-size: 14px;
      color: var(--text-muted);
      margin-bottom: 28px;
      font-weight: 400;
    }

    #btn-got-it {
      display: none;
      border: none;
      border-radius: 12px;
      padding: 13px 40px;
      font-family: var(--font-ui);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.12s;
    }
    #btn-got-it:active { transform: scale(0.96); }
    #feedback-overlay.wrong #btn-got-it { display: inline-block; background: var(--wrong); color: #fff; }
    #feedback-overlay.hint  #btn-got-it { display: inline-block; background: var(--surface-3); color: var(--text); border: 1px solid var(--border-mid); }

    /* ── Session complete ──────────────────────── */
    #complete-screen {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 300;
      background: var(--bg);
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 32px;
      text-align: center;
      gap: 10px;
    }
    #complete-screen.visible { display: flex; animation: fadeInUp 0.4s var(--ease-out) both; }

    .complete-kanji {
      font-family: var(--font-jp);
      font-size: 48px;
      color: var(--text);
      margin-bottom: 12px;
      opacity: 0.6;
      letter-spacing: 8px;
    }

    #complete-screen h1 {
      font-family: var(--font-ui);
      font-size: 22px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 8px;
      letter-spacing: -0.02em;
    }

    .stat-row {
      font-family: var(--font-ui);
      font-size: 14px;
      color: var(--text-muted);
    }
    .stat-row strong { color: var(--text); font-weight: 600; }

    /* Stats card */
    .stats-card {
      margin: 12px 0 4px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px 28px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      width: 100%;
      max-width: 280px;
    }

    .stat-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    #btn-restart {
      margin-top: 20px;
      background: var(--text);
      color: var(--bg);
      border: none;
      border-radius: 14px;
      padding: 14px 44px;
      font-family: var(--font-ui);
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.12s;
    }
    #btn-restart:hover  { opacity: 0.88; }
    #btn-restart:active { transform: scale(0.96); }
  </style>
</head>
<body>

  <div id="app-header">
    <div class="header-wordmark">
      <span class="header-kanji">漢字</span>
      <div class="header-divider"></div>
      <span class="header-latin">Kandy</span>
    </div>
    <div class="header-extra">
      Extra: <span id="extra-found">0</span> / <span id="extra-total">0</span>
    </div>
  </div>

  <div id="app">
    <div id="grid-container"></div>

    <div id="selection-strip">
      <span class="strip-label">Selected</span>
      <span id="selected-display"></span>
      <button id="btn-confirm" class="strip-btn">✓ Confirm</button>
      <button id="btn-cancel"  class="strip-btn">✕</button>
    </div>

    <div id="word-section">
      <div class="section-row">
        <span class="section-label">Words</span>
        <button id="btn-reveal">Reveal a word</button>
      </div>
      <div id="word-list"></div>
    </div>
  </div>

  <div id="toast"></div>

  <div id="modal-overlay">
    <div id="modal-box">
      <div class="modal-handle"></div>
      <div id="modal-word"></div>
      <div id="kana-tiles"></div>
      <div id="kana-answer">
        <span id="kana-answer-text"></span>
        <button id="btn-backspace">⌫</button>
      </div>
      <button id="btn-modal-reveal">Reveal answer</button>
    </div>
  </div>

  <div id="feedback-overlay">
    <div id="feedback-box">
      <div id="feedback-icon"></div>
      <div id="feedback-word"></div>
      <div id="feedback-reading"></div>
      <div id="feedback-meaning"></div>
      <button id="btn-got-it">Got it</button>
    </div>
  </div>

  <div id="complete-screen">
    <div class="complete-kanji">完了</div>
    <h1>Session Complete</h1>
    <div class="stats-card">
      <div class="stat-row" id="stat-cleared"></div>
      <div class="stat-row" id="stat-attempts"></div>
      <div class="stat-row" id="stat-accuracy"></div>
      <div class="stat-row" id="stat-time"></div>
    </div>
    <button id="btn-restart">Start Over</button>
  </div>

  <script type="module">
    // ── Helpers ───────────────────────────────────────────────────────────────
    const shuffle = arr => {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    };

    const sample = (arr, n) => shuffle(arr).slice(0, Math.min(n, arr.length));

    function isSubMultiset(needles, haystack) {
      const counts = new Map();
      for (const ch of haystack) counts.set(ch, (counts.get(ch) ?? 0) + 1);
      for (const ch of needles) {
        const c = counts.get(ch) ?? 0;
        if (c === 0) return false;
        counts.set(ch, c - 1);
      }
      return true;
    }

    const HIRAGANA_POOL = [
      "あ","い","う","え","お","か","き","く","け","こ",
      "さ","し","す","せ","そ","た","ち","つ","て","と",
      "な","に","ぬ","ね","の","は","ひ","ふ","へ","ほ",
      "ま","み","む","め","も","や","ゆ","よ","ら","り",
      "る","れ","ろ","わ","を","ん","が","ぎ","ぐ","げ",
      "ご","ざ","じ","ず","ぜ","ぞ","だ","ぢ","づ","で",
      "ど","ば","び","ぶ","べ","ぼ","ぱ","ぴ","ぷ","ぺ",
      "ぽ","っ","きゃ","きゅ","きょ","しゃ","しゅ","しょ",
      "ちゃ","ちゅ","ちょ","にゃ","にゅ","にょ","ひゃ","ひゅ",
      "ひょ","みゃ","みゅ","みょ","りゃ","りゅ","りょ","ぎゃ",
      "ぎゅ","ぎょ","じゃ","じゅ","じょ","びゃ","びゅ","びょ",
      "ぴゃ","ぴゅ","ぴょ",
    ];

    function generateTiles(word) {
      const answer = word.hiragana;
      const answerLen = answer.length;
      const minExtras = Math.min(10, Math.max(3, 6 - answerLen));
      const maxExtras = Math.max(0, Math.min(10, 12 - answerLen));
      const clampedMin = Math.min(minExtras, maxExtras);
      const numExtras = clampedMin + Math.floor(Math.random() * (maxExtras - clampedMin + 1));
      const answerSet = new Set(answer);
      const extras = shuffle(HIRAGANA_POOL.filter(k => !answerSet.has(k))).slice(0, numExtras);
      return shuffle([...answer, ...extras]);
    }

    // ── State ─────────────────────────────────────────────────────────────────
    const state = {
      dataset: [], datasetByKeyword: new Map(),
      targets: new Set(), bonuses: new Set(), allWords: [],
      sessionKanjiPool: [], pendingTargets: [],
      answeredCount: 0, wrongCount: 0, startTime: null,
      gridKanji: [], formableWords: [],
      mode: 'idle', selected: [], holdTimer: null,
      currentWord: null, tiles: [], kanaSelected: [],
      mastery: new Map(), masteryExemptKeywords: new Set(),
      revealedWords: new Set(), extraFound: new Set(),
      blockedTargets: new Map(), hintPending: new Set(),
    };

    // ── DOM refs ──────────────────────────────────────────────────────────────
    const $ = id => document.getElementById(id);
    const gridEl          = $('grid-container');
    const selectionStrip  = $('selection-strip');
    const selectedDisplay = $('selected-display');
    const toastEl         = $('toast');
    const modalOverlay    = $('modal-overlay');
    const modalWord       = $('modal-word');
    const feedbackOverlay = $('feedback-overlay');
    const feedbackIcon    = $('feedback-icon');
    const feedbackWord    = $('feedback-word');
    const feedbackReading = $('feedback-reading');
    const feedbackMeaning = $('feedback-meaning');
    const completeScreen  = $('complete-screen');
    const wordListEl      = $('word-list');

    // ── Button handlers ───────────────────────────────────────────────────────
    $('btn-confirm').addEventListener('click', () => {
      if (state.mode !== 'selecting' || state.selected.length === 0) return;
      submitSelection(state.selected.map(i => state.gridKanji[i]));
    });

    $('btn-cancel').addEventListener('click', () => {
      state.mode = 'idle'; state.selected = [];
      updateSelectionStrip();
    });

    $('btn-backspace').addEventListener('click', () => {
      if (state.mode !== 'question' || state.kanaSelected.length === 0) return;
      const lastIdx = state.kanaSelected.pop();
      const tileEl = $('kana-tiles').querySelector(`[data-tile-idx="${lastIdx}"]`);
      if (tileEl) tileEl.classList.remove('used');
      updateKanaAnswer();
    });

    $('btn-modal-reveal').addEventListener('click', () => {
      if (state.mode !== 'question') return;
      modalOverlay.classList.remove('visible');
      handleAnswer(false);
    });

    $('btn-got-it').addEventListener('click', dismissFeedback);

    $('btn-reveal').addEventListener('click', () => {
      const candidates = state.formableWords.filter(w =>
        state.targets.has(w) && state.pendingTargets.includes(w) && !state.revealedWords.has(w)
      );
      if (candidates.length === 0) { showToast('All visible words already revealed'); return; }
      const word = candidates[Math.floor(Math.random() * candidates.length)];
      state.revealedWords.add(word);
      renderWordList();
      // Centre the freshly-revealed word in the scrollable list and
      // briefly flash it so the user sees what changed.
      const el = wordListEl.querySelector(`[data-keyword="${CSS.escape(word.keyword)}"]`);
      if (el) {
        el.scrollIntoView({ behavior: 'smooth', block: 'center' });
        el.classList.add('just-revealed');
        el.addEventListener('animationend', () => el.classList.remove('just-revealed'), { once: true });
      }
    });

    $('btn-restart').addEventListener('click', () => {
      completeScreen.classList.remove('visible');
      initSession();
    });

    // ── Session init ──────────────────────────────────────────────────────────
    function initSession() {
      const dataset = state.dataset;
      const targetList = sample(dataset, 25);
      const targetSet = new Set(targetList);

      const bonusSet = new Set();
      for (const t of targetList) {
        for (const kw of t.distractors) {
          const w = state.datasetByKeyword.get(kw);
          if (w && !targetSet.has(w)) bonusSet.add(w);
        }
      }
      if (bonusSet.size < 25) {
        const pool = dataset.filter(w => !targetSet.has(w) && !bonusSet.has(w));
        for (const w of sample(pool, 25 - bonusSet.size)) bonusSet.add(w);
      }

      state.targets = targetSet;
      state.bonuses = bonusSet;
      state.allWords = [...targetSet, ...bonusSet];

      const poolSet = new Set();
      for (const w of state.allWords) for (const ch of w.kanji) poolSet.add(ch);
      state.sessionKanjiPool = [...poolSet];

      state.pendingTargets = [...targetList];
      state.answeredCount = 0; state.wrongCount = 0;
      state.startTime = Date.now();
      state.mode = 'idle'; state.selected = []; state.currentWord = null;
      state.mastery = new Map();
      state.masteryExemptKeywords = computeMasteryExemptKeywords(state.allWords, targetSet);
      state.revealedWords = new Set(); state.extraFound = new Set();
      state.blockedTargets = new Map(); state.hintPending = new Set();
      if (state.holdTimer !== null) { clearTimeout(state.holdTimer); state.holdTimer = null; }
      buildGridAndRender();
    }

    function buildGridAndRender() { buildGrid(); render(); }

    // ── Grid build ────────────────────────────────────────────────────────────
    const GRID_SIZE = 25;

    function buildGrid() {
      let best = null;
      for (let attempt = 0; attempt < 3; attempt++) {
        const result = tryBuildGrid();
        if (!best || result.formableWords.length > best.formableWords.length) best = result;
        if (best.formableWords.length >= 5) break;
      }
      state.gridKanji = best.gridKanji;
      state.formableWords = best.formableWords;
      for (const [w, n] of state.blockedTargets) {
        if (n <= 1) state.blockedTargets.delete(w);
        else state.blockedTargets.set(w, n - 1);
      }
    }

    function tryBuildGrid() {
      const gridKanji = [];
      const addKanji = ch => { gridKanji.push(ch); };

      let focusCandidates = state.pendingTargets.filter(w => (state.blockedTargets.get(w) ?? 0) === 0);
      if (focusCandidates.length === 0) focusCandidates = state.pendingTargets;

      let focus = null;
      if (focusCandidates.length > 0) {
        focus = focusCandidates[Math.floor(Math.random() * focusCandidates.length)];
        if (focus.kanji.length <= GRID_SIZE) for (const ch of focus.kanji) addKanji(ch);
      }

      const clearedTargets = [...state.targets].filter(w => !state.pendingTargets.includes(w));
      // Strict block check for the pack step. The focus fallback above
      // already rescues the all-pending-blocked edge case.
      const isBlocked = w => (state.blockedTargets.get(w) ?? 0) > 0;
      const packOrder = [
        ...shuffle(state.pendingTargets.filter(w => w !== focus && !isBlocked(w))),
        ...shuffle([...state.bonuses]),
        ...shuffle(clearedTargets),
      ];

      for (const w of packOrder) {
        if (gridKanji.length >= GRID_SIZE) break;
        if (w.kanji.length === 0) continue;
        const needed = countsNeededBeyond(w.kanji, gridKanji);
        if (needed.length === 0) continue;
        if (gridKanji.length + needed.length <= GRID_SIZE) for (const ch of needed) addKanji(ch);
      }

      if (gridKanji.length < GRID_SIZE) {
        const onGrid = new Set(gridKanji);
        const fill = shuffle(state.sessionKanjiPool.filter(ch => !onGrid.has(ch)));
        for (const ch of fill) { if (gridKanji.length >= GRID_SIZE) break; addKanji(ch); }
      }

      const shuffled = shuffle(gridKanji).slice(0, GRID_SIZE);
      const formableWords = state.allWords.filter(
        w => w.kanji.length > 0 && !softBlocked(w) && isSubMultiset(w.kanji, shuffled)
      );
      return { gridKanji: shuffled, formableWords };
    }

    function countsNeededBeyond(needles, haystack) {
      const available = new Map();
      for (const ch of haystack) available.set(ch, (available.get(ch) ?? 0) + 1);
      const needed = [];
      for (const ch of needles) {
        const c = available.get(ch) ?? 0;
        if (c > 0) available.set(ch, c - 1);
        else needed.push(ch);
      }
      return needed;
    }

    // Soft-block check used by formable/match. Mirrors the focus fallback
    // in tryBuildGrid: when EVERY pending target is blocked the user would
    // otherwise have nothing tappable, so we drop the block for pending
    // targets only. Bonuses and cleared targets stay hard-blocked.
    function softBlocked(w) {
      if ((state.blockedTargets.get(w) ?? 0) === 0) return false;
      if (!state.pendingTargets.includes(w)) return true;
      return state.pendingTargets.some(t => (state.blockedTargets.get(t) ?? 0) === 0);
    }

    const CORRECT_DISMISS_MS = 1800;

    function computeMasteryExemptKeywords(allWords, targetSet) {
      const nonTargetSingleKanji = new Set(
        allWords.filter(w => !targetSet.has(w) && w.kanji.length === 1).map(w => w.kanji[0])
      );
      const exempt = new Set();
      for (const w of allWords) {
        if (!targetSet.has(w) || w.kanji.length <= 1) continue;
        if (w.kanji.some(ch => nonTargetSingleKanji.has(ch))) exempt.add(w.keyword);
      }
      return exempt;
    }

    // ── Render ────────────────────────────────────────────────────────────────
    function renderWordList() {
      const prevItems = new Set(
        [...wordListEl.querySelectorAll('.word-item')].map(el => el.dataset.keyword)
      );
      wordListEl.innerHTML = '';
      let delay = 0;
      for (const w of state.targets) {
        const div = document.createElement('div');
        const pending  = state.pendingTargets.includes(w);
        const formable = pending && state.formableWords.some(fw => fw === w);
        const m        = pending ? (state.mastery.get(w) ?? 0) : null;
        const revealed = !pending || state.revealedWords.has(w);
        let cls = 'word-item ' + (pending ? 'pending' : 'cleared');
        if (formable) cls += ' formable';
        if (m === -1) cls += ' mastery-red';
        else if (m === 1) cls += ' mastery-orange';
        if (!revealed) cls += ' hidden';
        div.className = cls;
        div.dataset.keyword = w.keyword;
        const span = document.createElement('span');
        span.className = 'word-text';
        span.textContent = w.keyword;
        div.appendChild(span);
        if (pending) div.addEventListener('click', () => showHint(w));

        if (!prevItems.has(w.keyword)) {
          div.classList.add('animating-in');
          div.style.animationDelay = `${delay}ms`;
          delay += 18;
          div.addEventListener('animationend', () => div.classList.remove('animating-in'), { once: true });
        }
        wordListEl.appendChild(div);
      }
    }

    function render() {
      renderExtraCounter();
      renderGrid();
      renderWordList();
      modalOverlay.classList.remove('visible');
      feedbackOverlay.classList.remove('visible', 'correct', 'wrong', 'hint');
      selectionStrip.classList.remove('visible');
    }

    function renderExtraCounter() {
      $('extra-found').textContent = state.extraFound.size;
      $('extra-total').textContent = state.bonuses.size;
    }

    function renderGrid() {
      if (state.holdTimer !== null) { clearTimeout(state.holdTimer); state.holdTimer = null; }
      gridEl.innerHTML = '';

      const singleKanjiStatus = new Map();
      for (const w of state.allWords) {
        if (w.kanji.length !== 1) continue;
        const ch = w.kanji[0];
        if (!state.gridKanji.includes(ch)) continue;
        const isFound = state.targets.has(w) ? !state.pendingTargets.includes(w) : state.extraFound.has(w);
        const cur = singleKanjiStatus.get(ch);
        if (!cur || (isFound && cur !== 'found')) singleKanjiStatus.set(ch, isFound ? 'found' : 'present');
      }

      state.gridKanji.forEach((kanji, idx) => {
        const cell = document.createElement('div');
        cell.className = 'kanji-cell';
        if (singleKanjiStatus.get(kanji) === 'present') cell.classList.add('word-present');
        cell.textContent = kanji;
        cell.dataset.kanji = kanji;
        cell.dataset.index = idx;

        cell.classList.add('animating-in');
        cell.style.animationDelay = `${idx * 16}ms`;
        cell.addEventListener('animationend', () => {
          cell.classList.remove('animating-in');
          cell.style.animationDelay = '';
        }, { once: true });

        cell.addEventListener('pointerdown', e => {
          e.preventDefault();
          if (state.mode !== 'idle' && state.mode !== 'selecting') return;
          if (state.mode === 'idle') {
            cell.setPointerCapture(e.pointerId);
            state.holdTimer = setTimeout(() => {
              state.holdTimer = null;
              state.mode = 'selecting';
              state.selected = [idx];
              updateSelectionStrip();
            }, 250);
          } else if (state.mode === 'selecting') {
            if (!state.selected.includes(idx)) {
              state.selected.push(idx);
              updateSelectionStrip();
            }
          }
        });

        cell.addEventListener('pointerup', () => {
          if (state.holdTimer !== null) {
            clearTimeout(state.holdTimer);
            state.holdTimer = null;
            cell.classList.add('tapped');
            cell.addEventListener('animationend', () => cell.classList.remove('tapped'), { once: true });
            submitSelection([kanji]);
          }
        });

        cell.addEventListener('pointercancel', () => {
          if (state.holdTimer !== null) { clearTimeout(state.holdTimer); state.holdTimer = null; }
        });

        gridEl.appendChild(cell);
      });
    }

    function updateSelectionStrip() {
      selectionStrip.classList.toggle('visible', state.mode === 'selecting');
      selectedDisplay.textContent = state.selected.map(i => state.gridKanji[i]).join(' ');
      gridEl.querySelectorAll('.kanji-cell').forEach(cell => {
        cell.classList.toggle('selected', state.selected.includes(Number(cell.dataset.index)));
      });
    }

    function submitSelection(selectedKanji) {
      state.mode = 'idle'; state.selected = [];
      updateSelectionStrip();
      const query = selectedKanji.join('');
      const word  = matchWord(query);
      if (!word) { showToast('No word for that selection'); return; }
      showQuestion(word);
    }

    function matchWord(query) {
      const matches = state.allWords.filter(w => w.kanji.join('') === query && !softBlocked(w));
      if (matches.length === 0) return null;
      if (matches.length === 1) return matches[0];
      const pending = matches.filter(w => state.pendingTargets.includes(w));
      if (pending.length > 0) return pending[Math.floor(Math.random() * pending.length)];
      return matches[Math.floor(Math.random() * matches.length)];
    }

    let _toastTimer = null;
    function showToast(msg) {
      toastEl.textContent = msg;
      toastEl.classList.add('show');
      if (_toastTimer) clearTimeout(_toastTimer);
      _toastTimer = setTimeout(() => toastEl.classList.remove('show'), 1500);
    }

    function showQuestion(word) {
      state.currentWord = word; state.mode = 'question';
      state.tiles = generateTiles(word); state.kanaSelected = [];
      modalWord.textContent = word.word;

      const tilesEl = $('kana-tiles');
      tilesEl.innerHTML = '';
      state.tiles.forEach((kana, idx) => {
        const btn = document.createElement('button');
        btn.className = 'kana-tile';
        btn.textContent = kana;
        btn.dataset.tileIdx = idx;
        btn.style.opacity = '0';
        btn.style.transform = 'scale(0.82)';
        btn.style.transition = `opacity 0.16s ease ${idx * 28}ms, transform 0.18s cubic-bezier(0.22,1,0.36,1) ${idx * 28}ms`;
        requestAnimationFrame(() => requestAnimationFrame(() => {
          btn.style.opacity = '';
          btn.style.transform = '';
        }));
        btn.addEventListener('click', () => handleKanaTap(idx));
        tilesEl.appendChild(btn);
      });

      updateKanaAnswer();
      modalOverlay.classList.add('visible');
    }

    function handleKanaTap(idx) {
      if (state.mode !== 'question') return;
      const tileEl = $('kana-tiles').querySelector(`[data-tile-idx="${idx}"]`);
      if (!tileEl || tileEl.classList.contains('used')) return;
      tileEl.classList.add('tapped');
      tileEl.addEventListener('animationend', () => tileEl.classList.remove('tapped'), { once: true });
      tileEl.classList.add('used');
      state.kanaSelected.push(idx);
      updateKanaAnswer();
      if (state.kanaSelected.length === state.currentWord.hiragana.length) {
        const submitted = state.kanaSelected.map(i => state.tiles[i]);
        const isCorrect = submitted.every((k, i) => k === state.currentWord.hiragana[i]);
        setTimeout(() => { modalOverlay.classList.remove('visible'); handleAnswer(isCorrect); }, 180);
      }
    }

    function updateKanaAnswer() {
      $('kana-answer-text').textContent = state.kanaSelected.map(i => state.tiles[i]).join('');
    }

    function handleAnswer(isCorrect) {
      state.answeredCount++;
      if (!isCorrect) state.wrongCount++;
      const w = state.currentWord;
      const isTarget = state.targets.has(w);
      // Block whenever the word stays in pendingTargets after this answer
      // — i.e. the user still owes more correct taps to clear it. Cleared
      // targets and bonuses don't need a block: they won't be focused
      // again, so they won't surface naturally.
      let blockThisWord = false;
      if (isTarget) {
        // Whether right or wrong, the user has now seen the word's
        // reading and meaning in the feedback overlay — un-blur it in
        // the panel so they can keep referring to it.
        state.revealedWords.add(w);
        if (isCorrect) {
          if (state.hintPending.has(w)) {
            // Free pass: doesn't advance mastery, but still blocks for
            // 3 rebuilds so the user can't immediately re-tap the word
            // they just saw revealed.
            state.hintPending.delete(w);
            blockThisWord = true;
          } else {
            const m = state.mastery.get(w) ?? 0;
            if (m === 0 || m >= 2) {
              state.pendingTargets = state.pendingTargets.filter(x => x !== w);
            } else {
              state.mastery.set(w, m === -1 ? 1 : m + 1);
              blockThisWord = true;
            }
          }
        } else {
          if (!state.masteryExemptKeywords.has(w.keyword)) state.mastery.set(w, -1);
          state.hintPending.delete(w);
          blockThisWord = true;
        }
      } else if (isCorrect) {
        state.extraFound.add(w);
      }
      if (blockThisWord) state.blockedTargets.set(w, 3);
      showFeedback(isCorrect);
    }

    function showFeedback(isCorrect) {
      state.mode = 'feedback';
      feedbackOverlay.classList.remove('correct', 'wrong', 'hint');
      feedbackOverlay.classList.add(isCorrect ? 'correct' : 'wrong', 'visible');
      feedbackIcon.textContent = isCorrect ? '✓' : '✗';
      feedbackWord.textContent = state.currentWord.word;
      feedbackReading.textContent = state.currentWord.hiragana.join('');
      feedbackMeaning.textContent = state.currentWord.keyword;
      feedbackIcon.classList.remove('animating');
      void feedbackIcon.offsetWidth;
      feedbackIcon.classList.add('animating');
      if (isCorrect) setTimeout(dismissFeedback, CORRECT_DISMISS_MS);
    }

    function showHint(word) {
      if (state.mode !== 'idle') return;
      if (!state.masteryExemptKeywords.has(word.keyword)) state.mastery.set(word, -1);
      state.revealedWords.add(word);
      state.hintPending.add(word);
      state.currentWord = word;
      state.mode = 'feedback';
      feedbackOverlay.classList.remove('correct', 'wrong', 'hint');
      feedbackOverlay.classList.add('correct', 'hint', 'visible');
      feedbackIcon.textContent = '';
      feedbackWord.textContent = word.word;
      feedbackReading.textContent = word.hiragana.join('');
      feedbackMeaning.textContent = word.keyword;
    }

    function dismissFeedback() {
      if (!feedbackOverlay.classList.contains('visible')) return;
      const wasHint = feedbackOverlay.classList.contains('hint');
      feedbackOverlay.classList.remove('visible', 'correct', 'wrong', 'hint');
      if (state.pendingTargets.length === 0) { showComplete(); return; }
      state.mode = 'idle';
      if (wasHint) renderWordList();
      else buildGridAndRender();
    }

    function showComplete() {
      state.mode = 'complete';
      completeScreen.classList.add('visible');
      const total = state.targets.size;
      const elapsed = Math.floor((Date.now() - state.startTime) / 1000);
      const mins = String(Math.floor(elapsed / 60)).padStart(2, '0');
      const secs = String(elapsed % 60).padStart(2, '0');
      const accuracy = state.answeredCount > 0
        ? Math.round(((state.answeredCount - state.wrongCount) / state.answeredCount) * 100) : 100;
      const cleared = total - state.pendingTargets.length;
      $('stat-cleared').innerHTML  = `<span>Cleared</span><strong>${cleared} / ${total}</strong>`;
      $('stat-attempts').innerHTML = `<span>Attempts</span><strong>${state.answeredCount}</strong>`;
      $('stat-accuracy').innerHTML = `<span>Accuracy</span><strong>${accuracy}%</strong>`;
      $('stat-time').innerHTML     = `<span>Time</span><strong>${mins}:${secs}</strong>`;
    }

    // ── Boot ──────────────────────────────────────────────────────────────────
    const data = await fetch('./kandy_core_vocab.json').then(r => {
      if (!r.ok) throw new Error(`Failed to load data: ${r.status}`);
      return r.json();
    }).catch(err => {
      document.body.innerHTML = `<p style="padding:24px;font-family:sans-serif;color:#f06060;">Could not load kandy_core_vocab.json.<br><small>${err.message}</small></p>`;
      throw err;
    });
    state.dataset = data.words;
    state.datasetByKeyword = new Map(data.words.map(w => [w.keyword, w]));
    initSession();

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js').catch(err => console.warn('SW registration failed', err));
    }
  </script>
</body>
</html>
