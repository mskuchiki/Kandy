<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Kanji Grid Study</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --color-bg: #ffffff;
      --color-text: #1a1a1a;
      --color-cell-bg: #f8f8f8;
      --color-cell-border: #ddd;
      --color-cell-selected-bg: #e3f0ff;
      --color-cell-selected-border: #4a90d9;
      --color-correct: #2e7d32;
      --color-correct-bg: #e8f5e9;
      --color-wrong: #c62828;
      --color-wrong-bg: #ffebee;
      --color-progress: #4a90d9;
      --font-jp: 'Hiragino Sans', 'Meiryo', 'Noto Sans JP', sans-serif;
    }

    body {
      font-family: var(--font-jp);
      background: var(--color-bg);
      color: var(--color-text);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 16px;
      user-select: none;
      -webkit-user-select: none;
    }

    #app {
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    /* ── Progress bar ─────────────────────── */
    #progress-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 13px;
      color: #555;
    }

    #progress-track {
      flex: 1;
      height: 6px;
      background: #eee;
      border-radius: 3px;
      overflow: hidden;
    }

    #progress-fill {
      height: 100%;
      background: var(--color-progress);
      border-radius: 3px;
      transition: width 0.3s ease;
      width: 0%;
    }

    /* ── Kanji grid ───────────────────────── */
    #grid-container {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 6px;
    }

    .kanji-cell {
      aspect-ratio: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(28px, 10vw, 52px);
      background: var(--color-cell-bg);
      border: 2px solid var(--color-cell-border);
      border-radius: 6px;
      cursor: pointer;
      touch-action: none;
      transition: background 0.1s, border-color 0.1s, transform 0.1s;
    }

    .kanji-cell:active { transform: scale(0.93); }

    .kanji-cell.selected {
      background: var(--color-cell-selected-bg);
      border-color: var(--color-cell-selected-border);
      font-weight: bold;
    }

    /* ── Selection strip ──────────────────── */
    #selection-strip {
      display: none;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      background: #f0f4ff;
      border: 1px solid #c0d0f0;
      border-radius: 8px;
      padding: 10px 12px;
    }

    #selection-strip.visible { display: flex; }

    .strip-label { font-size: 12px; color: #666; }

    #selected-display {
      font-size: 24px;
      flex: 1;
      letter-spacing: 4px;
    }

    .strip-btn {
      border: none;
      border-radius: 6px;
      padding: 6px 14px;
      font-family: var(--font-jp);
      font-size: 13px;
      cursor: pointer;
    }

    #btn-confirm { background: #4a90d9; color: #fff; }
    #btn-cancel  { background: #fff; color: #666; border: 1px solid #ccc; }

    /* ── Toast ────────────────────────────── */
    #toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(12px);
      background: rgba(0,0,0,0.72);
      color: #fff;
      padding: 8px 20px;
      border-radius: 20px;
      font-size: 13px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s, transform 0.2s;
      white-space: nowrap;
      z-index: 500;
    }

    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ── Question modal ───────────────────── */
    #modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(255,255,255,0.88);
      backdrop-filter: blur(5px);
      -webkit-backdrop-filter: blur(5px);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    #modal-overlay.visible { display: flex; }

    #modal-box {
      background: #fff;
      border: 2px solid #1a1a1a;
      border-radius: 14px;
      padding: 28px 20px;
      width: 100%;
      max-width: 340px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.14);
    }

    #modal-word {
      text-align: center;
      font-size: 52px;
      font-weight: bold;
      margin-bottom: 24px;
      letter-spacing: 4px;
      min-height: 72px;
    }

    #choices-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .choice-btn {
      background: #f5f5f5;
      border: 1.5px solid #ccc;
      border-radius: 8px;
      padding: 14px 8px;
      font-family: var(--font-jp);
      font-size: 16px;
      cursor: pointer;
      transition: background 0.1s;
    }

    .choice-btn:hover { background: #eaeaea; }

    /* ── Feedback overlay ─────────────────── */
    #feedback-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 200;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    #feedback-overlay.visible { display: flex; }
    #feedback-overlay.correct { background: rgba(232,245,233,0.96); }
    #feedback-overlay.wrong   { background: rgba(255,235,238,0.96); }

    #feedback-box {
      background: #fff;
      border-radius: 14px;
      padding: 32px 24px;
      width: 100%;
      max-width: 340px;
      text-align: center;
      box-shadow: 0 8px 32px rgba(0,0,0,0.12);
    }

    #feedback-icon   { font-size: 48px; margin-bottom: 12px; }
    #feedback-reading { font-size: 28px; font-weight: bold; margin-bottom: 8px; }
    #feedback-meaning { font-size: 16px; color: #555; margin-bottom: 20px; }

    #feedback-overlay.correct #feedback-reading { color: var(--color-correct); }
    #feedback-overlay.wrong   #feedback-reading { color: var(--color-wrong); }

    #btn-got-it {
      display: none;
      background: var(--color-wrong);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 12px 32px;
      font-family: var(--font-jp);
      font-size: 15px;
      cursor: pointer;
    }

    #feedback-overlay.wrong #btn-got-it { display: inline-block; }

    /* ── Session complete ─────────────────── */
    #complete-screen {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 300;
      background: #fff;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px;
      text-align: center;
      gap: 14px;
    }

    #complete-screen.visible { display: flex; }
    #complete-screen h1  { font-size: 32px; }
    .stat-row            { font-size: 16px; color: #444; }

    #btn-restart {
      margin-top: 16px;
      background: #1a1a1a;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 14px 36px;
      font-family: var(--font-jp);
      font-size: 16px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="progress-bar">
      <span id="progress-text">0 / 25</span>
      <div id="progress-track"><div id="progress-fill"></div></div>
    </div>
    <div id="grid-container"></div>
    <div id="selection-strip">
      <span class="strip-label">Selected:</span>
      <span id="selected-display"></span>
      <button id="btn-confirm" class="strip-btn">✓ Confirm</button>
      <button id="btn-cancel"  class="strip-btn">✕ Cancel</button>
    </div>
  </div>

  <div id="toast"></div>

  <div id="modal-overlay">
    <div id="modal-box">
      <div id="modal-word"></div>
      <div id="choices-grid"></div>
    </div>
  </div>

  <div id="feedback-overlay">
    <div id="feedback-box">
      <div id="feedback-icon"></div>
      <div id="feedback-reading"></div>
      <div id="feedback-meaning"></div>
      <button id="btn-got-it">Got it</button>
    </div>
  </div>

  <div id="complete-screen">
    <h1>Session Complete!</h1>
    <div class="stat-row" id="stat-cleared"></div>
    <div class="stat-row" id="stat-accuracy"></div>
    <div class="stat-row" id="stat-time"></div>
    <button id="btn-restart">Start Over</button>
  </div>

  <script type="module">
    // ── Helpers ───────────────────────────────────────────────────────────────
    const stripHiragana = s => s.replace(/[぀-ゟ]/g, '');
    const shuffle = arr => {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    };

    // ── State ─────────────────────────────────────────────────────────────────
    const state = {
      // session
      allWords: [],
      kanjiPool: [],
      pendingTargets: [],
      answeredCount: 0,
      wrongCount: 0,
      startTime: null,
      // grid
      gridKanji: [],
      formableWords: [],
      // interaction
      mode: 'idle',   // 'idle' | 'selecting' | 'question' | 'feedback' | 'complete'
      selected: [],
      holdTimer: null,
      // question
      currentWord: null,
      choices: [],
      lastCorrect: null,
    };

    // ── DOM refs ──────────────────────────────────────────────────────────────
    const $ = id => document.getElementById(id);
    const gridEl          = $('grid-container');
    const progressText    = $('progress-text');
    const progressFill    = $('progress-fill');
    const selectionStrip  = $('selection-strip');
    const selectedDisplay = $('selected-display');
    const toastEl         = $('toast');
    const modalOverlay    = $('modal-overlay');
    const modalWord       = $('modal-word');
    const choicesGrid     = $('choices-grid');
    const feedbackOverlay = $('feedback-overlay');
    const feedbackIcon    = $('feedback-icon');
    const feedbackReading = $('feedback-reading');
    const feedbackMeaning = $('feedback-meaning');
    const completeScreen  = $('complete-screen');

    // ── Button handlers ───────────────────────────────────────────────────────
    $('btn-confirm').addEventListener('click', () => {
      if (state.mode !== 'selecting' || state.selected.length === 0) return;
      submitSelection([...state.selected]);
    });

    $('btn-cancel').addEventListener('click', () => {
      state.mode     = 'idle';
      state.selected = [];
      updateSelectionStrip();
    });

    $('btn-got-it').addEventListener('click', dismissFeedback);

    $('btn-restart').addEventListener('click', () => {
      completeScreen.classList.remove('visible');
      initSession(state.allWords, state.kanjiPool);
    });

    // ── Session init ──────────────────────────────────────────────────────────
    function initSession(allWords, kanjiPool) {
      state.allWords      = allWords;
      state.kanjiPool     = kanjiPool;
      state.pendingTargets = allWords.filter(w => w.target);
      state.answeredCount = 0;
      state.wrongCount    = 0;
      state.startTime     = Date.now();
      state.mode          = 'idle';
      state.selected      = [];
      state.currentWord   = null;
      if (state.holdTimer !== null) { clearTimeout(state.holdTimer); state.holdTimer = null; }
      buildGridAndRender();
    }

    function buildGridAndRender() {
      buildGrid();
      render();
    }

    // ── Grid build ────────────────────────────────────────────────────────────
    function buildGrid() {
      let best = null;
      for (let attempt = 0; attempt < 3; attempt++) {
        const result = tryBuildGrid();
        if (!best || result.formableWords.length > best.formableWords.length) best = result;
        if (best.formableWords.length >= 5) break;
      }
      state.gridKanji    = best.gridKanji;
      state.formableWords = best.formableWords;
    }

    function tryBuildGrid() {
      const MAX = 25;
      const kanjiSet = new Set();

      // Guard: if no pending targets (shouldn't happen in normal flow), fill from pool
      if (state.pendingTargets.length === 0) {
        for (const ch of state.kanjiPool) {
          if (kanjiSet.size >= MAX) break;
          kanjiSet.add(ch);
        }
        return { gridKanji: shuffle([...kanjiSet]).slice(0, MAX), formableWords: [] };
      }

      // 1. Focus word: random pending target
      const focus = state.pendingTargets[Math.floor(Math.random() * state.pendingTargets.length)];
      for (const ch of focus._stripped) kanjiSet.add(ch);

      // 2. Add complete words greedily until 25 unique kanji
      const pool = shuffle(state.allWords);
      for (const word of pool) {
        if (kanjiSet.size >= MAX) break;
        if (word._stripped.length === 0) continue;
        const newChars = [...word._stripped].filter(ch => !kanjiSet.has(ch));
        if (newChars.length === 0) continue;               // already fully representable — skip
        if (kanjiSet.size + newChars.length <= MAX) {
          newChars.forEach(ch => kanjiSet.add(ch));
        }
      }

      // 3. Fallback: fill remaining slots from kanji_pool
      if (kanjiSet.size < MAX) {
        for (const ch of state.kanjiPool) {
          if (kanjiSet.size >= MAX) break;
          if (!kanjiSet.has(ch)) kanjiSet.add(ch);
        }
      }

      if (kanjiSet.size < MAX) console.warn('Grid: could not fill 25 kanji');

      const gridKanji = shuffle([...kanjiSet]).slice(0, MAX);

      // 4. Compute all fully-representable words
      const formableWords = state.allWords.filter(w =>
        w._stripped.length > 0 && [...w._stripped].every(ch => kanjiSet.has(ch))
      );

      return { gridKanji, formableWords };
    }

    // ── Render ────────────────────────────────────────────────────────────────
    function render() {
      renderProgress();
      renderGrid();
      // Reset overlay visibility when re-entering idle
      modalOverlay.classList.remove('visible');
      feedbackOverlay.classList.remove('visible', 'correct', 'wrong');
      selectionStrip.classList.remove('visible');
    }

    function renderProgress() {
      const total   = state.allWords.filter(w => w.target).length;
      const cleared = total - state.pendingTargets.length;
      progressText.textContent  = `${cleared} / ${total}`;
      progressFill.style.width  = `${(cleared / total) * 100}%`;
    }

    function renderGrid() {
      if (state.holdTimer !== null) {
        clearTimeout(state.holdTimer);
        state.holdTimer = null;
      }
      gridEl.innerHTML = '';
      state.gridKanji.forEach(kanji => {
        const cell = document.createElement('div');
        cell.className    = 'kanji-cell';
        cell.textContent  = kanji;
        cell.dataset.kanji = kanji;

        cell.addEventListener('pointerdown', e => {
          e.preventDefault();
          if (state.mode !== 'idle' && state.mode !== 'selecting') return;

          if (state.mode === 'idle') {
            cell.setPointerCapture(e.pointerId);
            // Start hold timer
            state.holdTimer = setTimeout(() => {
              state.holdTimer = null;
              state.mode      = 'selecting';
              state.selected  = [kanji];
              updateSelectionStrip();
            }, 250);
          } else if (state.mode === 'selecting') {
            // Append to selection (no duplicates)
            if (!state.selected.includes(kanji)) {
              state.selected.push(kanji);
              updateSelectionStrip();
            }
          }
        });

        cell.addEventListener('pointerup', () => {
          if (state.holdTimer !== null) {
            clearTimeout(state.holdTimer);
            state.holdTimer = null;
            // Single tap — fired before hold threshold
            submitSelection([kanji]);
          }
        });

        cell.addEventListener('pointercancel', () => {
          if (state.holdTimer !== null) {
            clearTimeout(state.holdTimer);
            state.holdTimer = null;
          }
        });

        gridEl.appendChild(cell);
      });
    }

    function updateSelectionStrip() {
      selectionStrip.classList.toggle('visible', state.mode === 'selecting');
      selectedDisplay.textContent = state.selected.join(' ');
      // Highlight selected cells
      gridEl.querySelectorAll('.kanji-cell').forEach(cell => {
        cell.classList.toggle('selected', state.selected.includes(cell.dataset.kanji));
      });
    }

    function submitSelection(selectedKanji) {
      state.mode     = 'idle';
      state.selected = [];
      updateSelectionStrip();

      const query = selectedKanji.join('');
      const word  = matchWord(query);

      if (!word) {
        showToast('No word for that selection');
        return;
      }

      showQuestion(word);
    }

    function matchWord(query) {
      const matches = state.allWords.filter(w => w._stripped === query);
      if (matches.length === 0) return null;
      if (matches.length === 1) return matches[0];

      // Multiple matches: prefer uncleared targets
      const pending = matches.filter(w => state.pendingTargets.includes(w));
      if (pending.length > 0) return pending[Math.floor(Math.random() * pending.length)];
      return matches[Math.floor(Math.random() * matches.length)];
    }

    let _toastTimer = null;
    function showToast(msg) {
      toastEl.textContent = msg;
      toastEl.classList.add('show');
      if (_toastTimer) clearTimeout(_toastTimer);
      _toastTimer = setTimeout(() => toastEl.classList.remove('show'), 1500);
    }

    function showQuestion(word) {
      state.currentWord = word;
      state.mode        = 'question';

      state.choices = shuffle([
        word.reading,
        ...word.distractors.map(d => d.reading),
      ]);

      modalWord.textContent = word.kanji;

      choicesGrid.innerHTML = '';
      state.choices.forEach(reading => {
        const btn = document.createElement('button');
        btn.className   = 'choice-btn';
        btn.textContent = reading;
        btn.addEventListener('click', () => handleAnswer(reading));
        choicesGrid.appendChild(btn);
      });

      modalOverlay.classList.add('visible');
    }

    function handleAnswer(reading) {
      modalOverlay.classList.remove('visible');

      const isCorrect = reading === state.currentWord.reading;
      state.answeredCount++;
      if (!isCorrect) state.wrongCount++;
      state.lastCorrect = isCorrect;

      if (isCorrect && state.currentWord.target) {
        state.pendingTargets = state.pendingTargets.filter(w => w !== state.currentWord);
      }

      showFeedback(isCorrect);
    }

    function showFeedback(isCorrect) {
      state.mode = 'feedback';

      feedbackOverlay.classList.remove('correct', 'wrong');
      feedbackOverlay.classList.add(isCorrect ? 'correct' : 'wrong', 'visible');

      feedbackIcon.textContent    = isCorrect ? '✓' : '✗';
      feedbackReading.textContent = state.currentWord.reading;
      feedbackMeaning.textContent = state.currentWord.meaning;

      if (isCorrect) {
        setTimeout(dismissFeedback, 1000);
      }
      // Wrong: waits for "Got it" button — handled by event listener
    }

    function dismissFeedback() {
      feedbackOverlay.classList.remove('visible', 'correct', 'wrong');

      if (state.pendingTargets.length === 0) {
        showComplete();
        return;
      }

      buildGridAndRender();
    }

    function showComplete() {
      state.mode = 'complete';
      completeScreen.classList.add('visible');

      const total   = state.allWords.filter(w => w.target).length;
      const elapsed = Math.floor((Date.now() - state.startTime) / 1000);
      const mins    = String(Math.floor(elapsed / 60)).padStart(2, '0');
      const secs    = String(elapsed % 60).padStart(2, '0');
      const accuracy = state.answeredCount > 0
        ? Math.round(((state.answeredCount - state.wrongCount) / state.answeredCount) * 100)
        : 100;

      $('stat-cleared').textContent  = `Words cleared: ${total} / ${total}`;
      $('stat-accuracy').textContent = `Accuracy: ${accuracy}%`;
      $('stat-time').textContent     = `Time: ${mins}:${secs}`;
    }

    // ── Boot ─────────────────────────────────────────────────────────────────
    // Integration-verified: all five flows (single-tap, multi-select, session
    // complete, no-match, cancel) and all eight specific checks pass.
    const data = await fetch('./group1.json').then(r => {
      if (!r.ok) throw new Error(`Failed to load data: ${r.status}`);
      return r.json();
    }).catch(err => {
      document.body.innerHTML = `<p style="padding:24px;font-family:sans-serif;color:#c62828;">Could not load group1.json. Serve this file over HTTP (e.g. python3 -m http.server).<br><small>${err.message}</small></p>`;
      throw err;
    });
    data.words.forEach(w => { w._stripped = stripHiragana(w.kanji); });
    initSession(data.words, data.kanji_pool);
  </script>
</body>
</html>
